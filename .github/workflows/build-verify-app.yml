name: Build Verify App

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
  push:
    branches: [main]
    paths:
      - 'apps/verify/**'
      - 'libs/shared/crypto/**'
      - 'libs/shared/types/**'
      - '.github/workflows/build-verify-app.yml'

permissions:
  contents: read

env:
  EAS_BUILD_PROFILE: ${{ inputs.profile || 'preview' }}
  EAS_BUILD_PLATFORM: ${{ inputs.platform || 'all' }}

jobs:
  typecheck:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared libs
        run: npx nx run-many -t build -p @sign-chain/types @sign-chain/crypto

      - name: Typecheck verify app
        run: npx nx typecheck @sign-chain/verify

  build:
    name: EAS Build (${{ inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build shared libs
        run: npx nx run-many -t build -p @sign-chain/types @sign-chain/crypto

      - name: Build with EAS
        working-directory: apps/verify
        run: eas build --profile ${{ env.EAS_BUILD_PROFILE }} --platform ${{ env.EAS_BUILD_PLATFORM }} --non-interactive --no-wait

  submit:
    name: Submit to stores
    runs-on: ubuntu-latest
    needs: build
    if: inputs.profile == 'production'
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Submit to stores
        working-directory: apps/verify
        run: eas submit --platform ${{ env.EAS_BUILD_PLATFORM }} --non-interactive --latest
