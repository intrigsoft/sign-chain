<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" font-family="Georgia, serif" font-size="11">
  <defs>
    <marker id="aR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8">
      <polygon points="0,0 10,5 0,10" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Signature 1 -->
  <rect x="10" y="20" width="190" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="56" y="42" fill="#2c2420" font-weight="700">Signature 1</text>
  <text x="24" y="60" fill="#4a3f38" font-size="10">compositeHash = H1</text>
  <text x="24" y="76" fill="#4a3f38" font-size="10">previousTxHash = 0x000...000</text>
  <text x="24" y="92" fill="#7c3aed" font-size="10" font-weight="600">tx: 0xAAA...</text>

  <!-- Arrow right -->
  <line x1="200" y1="60" x2="248" y2="60" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#aR)"/>

  <!-- Signature 2 -->
  <rect x="250" y="20" width="190" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="296" y="42" fill="#2c2420" font-weight="700">Signature 2</text>
  <text x="264" y="60" fill="#4a3f38" font-size="10">compositeHash = H2</text>
  <text x="264" y="76" fill="#4a3f38" font-size="10">previousTxHash = 0xAAA...</text>
  <text x="264" y="92" fill="#7c3aed" font-size="10" font-weight="600">tx: 0xBBB...</text>

  <!-- Arrow right -->
  <line x1="440" y1="60" x2="488" y2="60" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#aR)"/>

  <!-- Signature 3 -->
  <rect x="490" y="20" width="190" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="536" y="42" fill="#2c2420" font-weight="700">Signature 3</text>
  <text x="504" y="60" fill="#4a3f38" font-size="10">compositeHash = H3</text>
  <text x="504" y="76" fill="#4a3f38" font-size="10">previousTxHash = 0xBBB...</text>
  <text x="504" y="92" fill="#7c3aed" font-size="10" font-weight="600">tx: 0xCCC...</text>
</svg>
