services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: signchain
      POSTGRES_PASSWORD: signchain
      POSTGRES_DB: signchain
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U signchain']
      interval: 3s
      timeout: 3s
      retries: 10

  hardhat:
    image: node:20-alpine
    ports:
      - '8545:8545'
    working_dir: /app
    volumes:
      - ./contracts:/app
      - hardhat_node_modules:/app/node_modules
    command: sh -c "npm install && npx hardhat compile && npx hardhat node --hostname 0.0.0.0"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8545 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

volumes:
  pgdata:
  hardhat_node_modules:
